<!DOCTYPE html>
<html lang="en">

<head>
    <title>Lenskart - Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f7f9fc;
            transition: background 0.4s ease, color 0.4s ease;
        }
        header {
            background: #fff;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 26px;
            border-bottom: 2px solid #e5e5e5;
            color: #2c6bed;
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        nav {
            background: #2c6bed;
            padding: 15px;
            text-align: center;
            transition: background 0.4s ease;
        }

        nav a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-weight: bold;
            position: relative;
            padding-bottom: 4px;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: white;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }
        .form-section {
            padding: 50px 30px;
            background: white;
            max-width: 500px;
            margin: 40px auto;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .form-section h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c6bed;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
            color: #444;
            transition: color 0.4s ease;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ddd;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s, background 0.4s ease, color 0.4s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border: 1px solid #2c6bed;
            box-shadow: 0 0 8px rgba(44, 107, 237, 0.3);
        }
        button[type="submit"] {
            margin-top: 25px;
            padding: 14px;
            width: 100%;
            background: #2c6bed;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button[type="submit"]:hover {
            background: #1f4fc4;
            transform: scale(1.02);
        }
        footer {
            background: #2c6bed;
            color: white;
            text-align: center;
            padding: 15px;
            transition: background 0.4s ease;
        }
        body.dark 
        { 
            background: #121212; color: #e0e0e0; 
        }

        body.dark header
        { 
            background: #1e1e1e; border-color: #333; 
        }
        body.dark nav                
        {
             background: #1a1a2e; 
        }
        body.dark .container h2      
        {
             color: #f0f0f0; 
        }
        body.dark .card 
        { 
            background: #1e1e1e; border-color: #333; 
        }
        body.dark .card-body h3
        {
             color: #f0f0f0; 
        }
        body.dark .card-body p { 
            color: #aaa; 
        }
        body.dark .card-footer
        {
             border-color: #333; 
        }
        body.dark footer
        {
             background: #1a1a2e; 
        }
        .toggle-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #2c6bed;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            z-index: 999;
            transition: background 0.3s, transform 0.2s;
        }

        .toggle-btn:hover {
            background: #1f4fc4;
            transform: scale(1.1);
        }

    </style>
</head>

<body>
    <header>Lenskart</header>
    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="order.html">Order</a>
    </nav>
    <section class="form-section">

        <h2>Place Your Order</h2>

        <form>

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" required>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Select Frame</label>
            <select>
                <option>Classic Black Frame</option>
                <option>Modern Transparent</option>
                <option>Premium Metal Frame</option>
                <option>Round Vintage</option>
                <option>Luxury Gold Frame</option>
            </select>

            <label>Prescription Details</label>
            <textarea rows="4" placeholder="Enter prescription details"></textarea>

            <button type="submit">Submit Order</button>

        </form>

    </section>
    <footer>
        <p>2026 Lenskart</p>
    </footer>
    <button class="toggle-btn" id="toggleBtn">🌙</button>

    <script>

        const toggleBtn = document.getElementById('toggleBtn');

        toggleBtn.addEventListener('click', function () {
            document.body.classList.toggle('dark');
            if (document.body.classList.contains('dark')) {
                toggleBtn.textContent = '☀️';
            } else {
                toggleBtn.textContent = '🌙';
            }

        });

    </script>

</body>

</html>
